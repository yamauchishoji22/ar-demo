<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f2f0e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>山内商事㈱　電設金物AR体験サイト</title>
  <!-- フォント・ライブラリはすべてローカル配信 (外部送信なし) -->
  <script type="module" src="./model-viewer.min.js"></script>

  <style>
/* ══════════════════════════════════════════════
   Custom Properties — Light / Ivory Theme
══════════════════════════════════════════════ */
:root {
  --bg:        #f2f0e8;
  --bg2:       #eeece3;
  --card-bg:   #ffffff;
  --card-bg2:  #fafaf7;
  --border:    rgba(0,0,0,.09);
  --text:      #1e1c2e;
  --muted:     rgba(50,45,80,.5);
  --radius:    22px;
  --ease:      cubic-bezier(0.23, 1, 0.32, 1);
  --ease-back: cubic-bezier(0.34, 1.20, 0.64, 1);
}

/* ══════════════════════════════════════════════
   Reset
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif;
  min-height: 100svh;
  overflow-x: hidden;
}
@media (hover: hover) { body { cursor: none; } }

/* ══════════════════════════════════════════════
   Custom Cursor
══════════════════════════════════════════════ */
#cur-dot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 7px; height: 7px;
  background: #6366f1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .18s, height .18s;
  mix-blend-mode: multiply;
}
#cur-ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 34px; height: 34px;
  border: 1.5px solid rgba(99,102,241,.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .32s var(--ease), height .32s var(--ease), border-color .22s;
}
@media (hover: none) { #cur-dot, #cur-ring { display: none; } }

/* ══════════════════════════════════════════════
   Soft Aurora Background
══════════════════════════════════════════════ */
.aurora {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(90px);
}
.b1 {
  width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(99,102,241,.10), transparent 62%);
  top: -20%; left: -14%;
  animation: bf1 22s ease-in-out infinite alternate;
}
.b2 {
  width: 55vw; height: 55vw;
  background: radial-gradient(circle, rgba(6,182,212,.08), transparent 62%);
  bottom: -20%; right: -10%;
  animation: bf2 28s ease-in-out infinite alternate;
}
.b3 {
  width: 42vw; height: 42vw;
  background: radial-gradient(circle, rgba(168,85,247,.07), transparent 62%);
  top: 35%; left: 40%;
  animation: bf3 34s ease-in-out infinite alternate;
}
.b4 {
  width: 28vw; height: 28vw;
  background: radial-gradient(circle, rgba(244,114,182,.07), transparent 62%);
  top: 12%; right: 18%;
  animation: bf4 18s ease-in-out infinite alternate;
}
@keyframes bf1 { to { transform: translate(12vw, 8vh) scale(1.12); } }
@keyframes bf2 { to { transform: translate(-10vw, -6vh) scale(.9); } }
@keyframes bf3 { to { transform: translate(-18vw, 12vh) scale(1.2); } }
@keyframes bf4 { to { transform: translate(7vw, 16vh) scale(1.1); } }

/* Subtle dot grid */
.dot-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(0,0,0,.07) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 90% 85% at 50% 45%, rgba(0,0,0,.4), transparent);
  -webkit-mask-image: radial-gradient(ellipse 90% 85% at 50% 45%, rgba(0,0,0,.4), transparent);
}

/* ══════════════════════════════════════════════
   Layout
══════════════════════════════════════════════ */
.wrap {
  position: relative; z-index: 1;
  max-width: 1160px;
  margin: 0 auto;
  padding: 36px 20px calc(80px + env(safe-area-inset-bottom,0px));
}

/* ══════════════════════════════════════════════
   Hero
══════════════════════════════════════════════ */
.hero {
  padding: 0 0 28px;
  text-align: center;
}
.hero-h1 {
  font-size: clamp(34px, 8vw, 72px);
  font-weight: 900;
  line-height: 1.06;
  letter-spacing: -.02em;
  margin-bottom: 14px;
  color: var(--text);
}
.hero-h1 .shine {
  display: block;
  background: linear-gradient(110deg, #4f46e5 0%, #0ea5e9 38%, #9333ea 68%, #db2777 100%);
  background-size: 250% auto;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine-move 5s linear infinite alternate;
}
@keyframes shine-move { to { background-position: 100% center; } }
.hero-body {
  font-size: 14px; font-weight: 400;
  color: var(--muted); line-height: 1.8;
  max-width: 400px;
  margin: 0 auto;
}

/* ══════════════════════════════════════════════
   Random Section
══════════════════════════════════════════════ */
.random-section {
  margin-bottom: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.random-btn {
  width: 100%;
  max-width: 480px;
  padding: 20px 28px;
  border-radius: 20px;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif;
  letter-spacing: .02em;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(99,102,241,.32), 0 2px 8px rgba(99,102,241,.18);
  transition: transform .3s var(--ease), box-shadow .3s var(--ease);
  position: relative;
  overflow: hidden;
}
.random-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.18), transparent 60%);
  pointer-events: none;
}
.random-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 44px rgba(99,102,241,.42), 0 4px 12px rgba(99,102,241,.22);
}
.random-btn:active { transform: scale(.97); }
.random-icon {
  font-size: 22px;
  animation: spin-dice 3s linear infinite;
}
@keyframes spin-dice {
  0%,90%  { transform: rotate(0deg); }
  100%    { transform: rotate(360deg); }
}
.random-hint {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .08em;
}

/* ══════════════════════════════════════════════
   Section Header
══════════════════════════════════════════════ */
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.sec-count { font-size: 10px; font-weight: 600; letter-spacing: .14em; color: rgba(99,102,241,.7); }

/* ══════════════════════════════════════════════
   Bento Grid
══════════════════════════════════════════════ */
.bento {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 13px;
}
.card-wrap:nth-child(1) { grid-column: span 2; }
.card-wrap:nth-child(4) { grid-column: span 2; }

@media (max-width: 840px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .card-wrap:nth-child(1),
  .card-wrap:nth-child(4) { grid-column: span 2; }
}
@media (max-width: 500px) {
  .bento { grid-template-columns: 1fr; }
  .card-wrap:nth-child(1),
  .card-wrap:nth-child(4) { grid-column: span 1; }
}

/* ══════════════════════════════════════════════
   Card Wrapper (border)
══════════════════════════════════════════════ */
.card-wrap {
  position: relative;
  border-radius: calc(var(--radius) + 1.5px);
  padding: 1.5px;
  background: rgba(0,0,0,.07);
  opacity: 0;
  transform: translateY(24px) scale(.98);
  transition: opacity .6s var(--ease), transform .6s var(--ease), background .35s;
}
.card-wrap.in-view { opacity: 1; transform: none; }
.card-wrap::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, #6366f1, #38bdf8, #a855f7, #f472b6, #34d399);
  opacity: 0; transition: opacity .4s;
  z-index: -1;
}
.card-wrap:hover::before { opacity: 1; }

/* ══════════════════════════════════════════════
   Model Card
══════════════════════════════════════════════ */
.card {
  position: relative;
  border-radius: var(--radius);
  background: linear-gradient(160deg, var(--card-bg2) 0%, var(--card-bg) 100%);
  overflow: hidden;
  cursor: pointer;
  transition: transform .4s var(--ease), box-shadow .4s var(--ease);
  transform: perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
  box-shadow: 0 2px 16px rgba(0,0,0,.07), 0 0 0 0 transparent;
}
.card-wrap:hover .card {
  box-shadow: 0 20px 56px rgba(0,0,0,.14), 0 0 44px var(--glow, rgba(99,102,241,.12));
}

/* Inner glow tint */
.card-glow {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, var(--glow, rgba(99,102,241,.06)), transparent);
  opacity: 0; transition: opacity .45s;
}
.card-wrap:hover .card-glow { opacity: 1; }

/* Scan line shimmer on hover */
.card::after {
  content: '';
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 3px,
    rgba(0,0,0,.018) 3px, rgba(0,0,0,.018) 4px
  );
  opacity: 0; transition: opacity .4s;
}
.card-wrap:hover .card::after { opacity: 1; }

/* ── Card Viewer ── */
.card-viewer {
  position: relative;
  height: 200px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse 80% 70% at 50% 50%,
    var(--card-orb-bg, rgba(99,102,241,.06)), rgba(250,250,247,.9) 70%);
}
.card-wrap:nth-child(1) .card-viewer { height: 260px; }

.card-viewer model-viewer {
  width: 100%; height: 100%;
  background: transparent;
  --poster-color: transparent;
}

/* Orb fallback */
.orb-scene {
  position: relative;
  width: 140px; height: 140px;
}
.card-wrap:nth-child(1) .orb-scene { width: 180px; height: 180px; }
.orb-core {
  position: absolute; inset: 25%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 32%,
    rgba(255,255,255,.35) 0%,
    var(--card-orb-a, rgba(99,102,241,1)) 40%,
    var(--card-orb-b, rgba(168,85,247,1)) 100%);
  box-shadow: 0 0 30px var(--card-orb-glow, rgba(99,102,241,.5)), inset 0 0 20px rgba(255,255,255,.15);
  animation: orb-breathe 4s ease-in-out infinite;
}
@keyframes orb-breathe {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}
.orb-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
}
.orb-ring-1 {
  border-color: var(--card-orb-r1, rgba(99,102,241,.5));
  transform: rotateX(72deg) rotateZ(20deg);
  animation: spin-ring-1 6s linear infinite;
}
.orb-ring-2 {
  inset: 8%;
  border-color: var(--card-orb-r2, rgba(168,85,247,.45));
  transform: rotateX(65deg) rotateZ(-40deg);
  animation: spin-ring-2 9s linear infinite reverse;
}
.orb-ring-3 {
  inset: -8%;
  border-color: var(--card-orb-r3, rgba(56,189,248,.3));
  transform: rotateX(30deg) rotateZ(70deg);
  animation: spin-ring-1 13s linear infinite;
  opacity: .6;
}
.orb-ring-1::after {
  content: '';
  position: absolute; top: -3px; left: calc(50% - 3px);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--card-orb-a, #6366f1);
  box-shadow: 0 0 8px var(--card-orb-a, #6366f1);
}
.orb-ring-2::after {
  content: '';
  position: absolute; bottom: -2.5px; right: calc(50% - 2.5px);
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--card-orb-r2, #a855f7);
  box-shadow: 0 0 6px var(--card-orb-r2, #a855f7);
}
@keyframes spin-ring-1 { to { transform: rotateX(72deg) rotateZ(380deg); } }
@keyframes spin-ring-2 { to { transform: rotateX(65deg) rotateZ(-400deg); } }
.orb-dots { position: absolute; inset: -20%; animation: spin-ring-1 20s linear infinite; }
.orb-dots::before, .orb-dots::after {
  content: ''; position: absolute;
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(80,60,140,.3);
}
.orb-dots::before { top: 15%; left: 10%; animation: flicker 3s ease-in-out infinite; }
.orb-dots::after  { bottom: 20%; right: 12%; animation: flicker 4s ease-in-out infinite .8s; }
@keyframes flicker { 0%,100%{opacity:.15} 50%{opacity:.7} }
.orb-tag {
  position: absolute; bottom: 12px;
  font-size: 9px; font-weight: 700; letter-spacing: .22em;
  color: var(--muted); text-align: center; width: 100%;
  text-transform: uppercase;
}

/* Card Footer */
.card-foot {
  position: relative; z-index: 6;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
  padding: 14px 18px 18px;
  border-top: 1px solid rgba(0,0,0,.06);
}
.foot-num  { font-size: 10px; font-weight: 600; letter-spacing: .2em; color: var(--muted); margin-bottom: 3px; }
.foot-name { font-size: 15px; font-weight: 700; letter-spacing: .01em; margin-bottom: 2px; color: var(--text); }
.foot-sub  { font-size: 11px; color: var(--muted); }
.ar-chip {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif;
  letter-spacing: .1em; white-space: nowrap;
  padding: 8px 14px; border-radius: 100px;
  background: rgba(99,102,241,.08);
  border: 1px solid rgba(99,102,241,.22);
  color: #4f46e5;
  transition: .35s var(--ease);
}
.card-wrap:hover .ar-chip {
  background: rgba(99,102,241,.16);
  border-color: rgba(99,102,241,.5);
  box-shadow: 0 0 18px rgba(99,102,241,.18);
  transform: translateX(3px);
}

/* ══════════════════════════════════════════════
   AR Bottom Sheet Modal
══════════════════════════════════════════════ */
#ar-modal {
  position: fixed; inset: 0; z-index: 800;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease, backdrop-filter .3s;
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
}
#ar-modal::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(0,0,0,0); transition: background .3s;
}
#ar-modal.open {
  opacity: 1; pointer-events: all;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#ar-modal.open::before { background: rgba(30,28,46,.45); }

.ar-sheet {
  position: relative; z-index: 1;
  width: 100%; max-width: 560px;
  background: linear-gradient(180deg, #ffffff, #faf9f5);
  border: 1px solid rgba(0,0,0,.08); border-bottom: none;
  border-radius: 30px 30px 0 0;
  padding: 14px 28px calc(44px + env(safe-area-inset-bottom,0px));
  transform: translateY(100%);
  transition: transform .5s var(--ease-back);
  box-shadow: 0 -20px 60px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.9);
}
#ar-modal.open .ar-sheet { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px; border-radius: 100px;
  background: rgba(0,0,0,.12);
  margin: 0 auto 24px;
}

/* Selected model card in sheet */
.sheet-card {
  display: flex; align-items: center; gap: 14px;
  background: rgba(0,0,0,.03);
  border: 1px solid rgba(0,0,0,.07);
  border-radius: 16px; padding: 13px 15px;
  margin-bottom: 22px; position: relative; overflow: hidden;
}
.sheet-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--sc-color, rgba(99,102,241,.06)), transparent);
  pointer-events: none;
}
.sc-thumb {
  width: 52px; height: 52px; border-radius: 13px;
  display: grid; place-items: center; font-size: 24px; flex-shrink: 0;
  background: var(--sc-bg, rgba(99,102,241,.08));
  border: 1px solid var(--sc-bd, rgba(99,102,241,.18));
}
.sc-tag  { font-size: 10px; font-weight: 600; letter-spacing: .16em; color: var(--muted); margin-bottom: 3px; }
.sc-name { font-size: 16px; font-weight: 800; color: var(--text); }

.sheet-h { font-size: 22px; font-weight: 900; letter-spacing: -.01em; margin-bottom: 7px; color: var(--text); }
.sheet-p { font-size: 13px; font-weight: 400; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }

/* Modal model-viewer */
#modal-mv {
  border-radius: 14px;
  overflow: hidden;
}

/* Mystery preview (random mode) */
#mystery-preview {
  display: none;
  width: 100%; height: 180px;
  margin-bottom: 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,.07), rgba(168,85,247,.07));
  border: 1.5px dashed rgba(99,102,241,.25);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
}
#mystery-preview .mystery-q {
  font-size: 64px;
  animation: mystery-pulse 1.2s ease-in-out infinite;
}
#mystery-preview .mystery-label {
  font-size: 11px; font-weight: 600; letter-spacing: .18em;
  color: rgba(99,102,241,.6); text-transform: uppercase;
}
@keyframes mystery-pulse {
  0%,100% { transform: scale(1);    opacity: .7; }
  50%      { transform: scale(1.12); opacity: 1;  }
}

/* Random mode: モデル名・ミステリー切替 */
#ar-modal.random-mode .sheet-card       { display: none; }
#ar-modal.random-mode #mystery-preview  { display: flex; }

.s-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; padding: 18px; border-radius: 18px;
  font-size: 15px; font-weight: 700; font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif;
  letter-spacing: .02em; border: none; cursor: pointer;
  transition: .35s var(--ease);
}
.s-btn-primary {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #c084fc 100%);
  color: #fff;
  box-shadow: 0 8px 32px rgba(99,102,241,.35);
  margin-bottom: 10px;
}
.s-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 44px rgba(99,102,241,.48); }
.s-btn-primary:active { transform: scale(.97); }
.s-btn-ghost {
  background: rgba(0,0,0,.04);
  color: rgba(50,45,80,.65);
  border: 1px solid rgba(0,0,0,.09);
}
.s-btn-ghost:hover { background: rgba(0,0,0,.08); color: var(--text); }

/* ══════════════════════════════════════════════
   Hero entrance
══════════════════════════════════════════════ */
[data-in] { opacity: 0; transform: translateY(16px); }

/* ══════════════════════════════════════════════
   Mobile (≤ 500px)
══════════════════════════════════════════════ */
@media (max-width: 500px) {
  .wrap { padding: 22px 14px calc(60px + env(safe-area-inset-bottom,0px)); }

  .hero { padding-bottom: 20px; }
  .hero-h1 { font-size: clamp(30px, 9vw, 40px); margin-bottom: 10px; }
  .hero-body { font-size: 13px; }

  .random-btn { padding: 18px 20px; font-size: 16px; border-radius: 18px; }
  .random-section { margin-bottom: 24px; }

  .sec-header { margin-bottom: 10px; }
  .bento { gap: 10px; }

  .card-viewer { height: 170px; }
  .card-wrap:nth-child(1) .card-viewer { height: 210px; }
  .orb-scene { width: 116px; height: 116px; }
  .card-wrap:nth-child(1) .orb-scene { width: 148px; height: 148px; }

  .card-foot { padding: 11px 13px 14px; gap: 8px; }
  .foot-name { font-size: 13px; }
  .ar-chip { height: 44px; padding: 0 13px; font-size: 10px; }

  .ar-sheet {
    border-radius: 24px 24px 0 0;
    padding: 12px 18px calc(28px + env(safe-area-inset-bottom,0px));
  }
  .sheet-card { padding: 11px 13px; border-radius: 13px; }
  .sc-thumb { width: 44px; height: 44px; font-size: 20px; }
  .sc-name { font-size: 14px; }
  .sheet-h { font-size: 19px; }
  .sheet-p { font-size: 12px; margin-bottom: 16px; }
  .s-btn { padding: 16px; font-size: 15px; border-radius: 16px; }

  .s-btn-primary:hover { transform: none; box-shadow: 0 8px 32px rgba(99,102,241,.35); }
  .card-wrap:hover .card { box-shadow: 0 2px 16px rgba(0,0,0,.07); }
  .card-wrap:hover .card-glow,
  .card-wrap:hover .card::after { opacity: 0; }
}

/* Tablet (501–840px) */
@media (min-width: 501px) and (max-width: 840px) {
  .wrap { padding: 28px 18px 72px; }
  .card-viewer { height: 185px; }
  .card-wrap:nth-child(1) .card-viewer { height: 230px; }
}
  </style>
</head>
<body>

<!-- Cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- Background -->
<div class="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>
<div class="dot-grid" aria-hidden="true"></div>

<!-- ─────────────────────────────────── APP ─── -->
<div class="wrap">

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero-h1" data-in>
      山内商事　電設金物<span class="shine">AR体験サイト</span>
    </h1>
    <p class="hero-body" data-in>
      モデルを選択してARを起動。スマートフォンのカメラで現実空間に3Dオブジェクトを配置できます。
    </p>
  </section>

  <!-- Random -->
  <div class="random-section" data-in>
    <button class="random-btn" id="btn-random">
      <span class="random-icon">🎲</span>
      ランダムAR体験
    </button>
    <p class="random-hint">1〜5のモデルからランダムで体験できます</p>
  </div>

  <!-- Gallery -->
  <div class="sec-header" data-in>
    <span class="sec-label">モデルを選択</span>
    <span class="sec-count">5 MODELS</span>
  </div>

  <div class="bento" id="bento"></div>

</div>
<!-- ───────────────────────── END APP ─── -->

<!-- AR Modal -->
<div id="ar-modal" role="dialog" aria-modal="true" aria-label="ARカメラ起動">
  <div class="ar-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-card">
      <div>
        <div class="sc-tag">選択中のモデル</div>
        <div class="sc-name" id="sc-name">—</div>
      </div>
    </div>

    <div class="sheet-h">ARカメラを起動</div>
    <p class="sheet-p">
      カメラを使って現実空間に3Dモデルを配置します。<br>
      明るい場所・平らな面の上でお試しください。
    </p>

    <!-- ランダムモード用ミステリー表示 -->
    <div id="mystery-preview">
      <div class="mystery-q">🎲</div>
      <div class="mystery-label">何が出るかお楽しみ</div>
    </div>

    <!-- model-viewer: iOS Quick Look / Android Scene Viewer を自動で処理 -->
    <model-viewer
      id="modal-mv"
      ar
      ar-modes="scene-viewer quick-look webxr"
      camera-controls
      auto-rotate
      auto-rotate-delay="400"
      rotation-per-second="15deg"
      scale="0.01 0.01 0.01"
      interaction-prompt="none"
      style="width:100%;height:180px;background:transparent;--poster-color:transparent;display:block;margin-bottom:14px;border-radius:14px;overflow:hidden;"
    ></model-viewer>

    <button id="btn-ar-launch" class="s-btn s-btn-primary">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M2 12a10 10 0 1 0 20 0 10 10 0 0 0-20 0z" stroke-opacity=".4"/>
        <path d="M4.9 4.9l.7.7M18.4 4.9l-.7.7M4.9 19.1l.7-.7M18.4 19.1l-.7-.7"/>
      </svg>
      カメラを起動する
    </button>

    <button id="btn-close" class="s-btn s-btn-ghost">閉じる</button>
  </div>
</div>

<!-- ──────────────────────── SCRIPT ─── -->
<script>
/* ─────────── Model data ─────────── */
const MODELS = [
  { id:1, name:'ハト小屋カバー', sub:'Object · GLB / USDZ', emoji:'🏠',
    orbA:'#6366f1', orbB:'#8b5cf6', orbGlow:'rgba(99,102,241,.5)',
    orbR1:'rgba(99,102,241,.45)', orbR2:'rgba(168,85,247,.4)', orbR3:'rgba(56,189,248,.25)',
    orbBg:'rgba(99,102,241,.07)', r:99, g:102, b:241 },
  { id:2, name:'フリアク架台', sub:'Object · GLB / USDZ', emoji:'🔩',
    orbA:'#06b6d4', orbB:'#0ea5e9', orbGlow:'rgba(6,182,212,.5)',
    orbR1:'rgba(6,182,212,.45)', orbR2:'rgba(14,165,233,.4)', orbR3:'rgba(99,102,241,.25)',
    orbBg:'rgba(6,182,212,.07)', r:6, g:182, b:212 },
  { id:3, name:'チャンネルベース', sub:'Object · GLB / USDZ', emoji:'⚙️',
    orbA:'#a855f7', orbB:'#c084fc', orbGlow:'rgba(168,85,247,.5)',
    orbR1:'rgba(168,85,247,.45)', orbR2:'rgba(192,132,252,.4)', orbR3:'rgba(244,114,182,.25)',
    orbBg:'rgba(168,85,247,.07)', r:168, g:85, b:247 },
  { id:4, name:'カメラ自在金具', sub:'Object · GLB / USDZ', emoji:'📷',
    orbA:'#10b981', orbB:'#34d399', orbGlow:'rgba(16,185,129,.5)',
    orbR1:'rgba(16,185,129,.45)', orbR2:'rgba(52,211,153,.4)', orbR3:'rgba(6,182,212,.25)',
    orbBg:'rgba(16,185,129,.07)', r:16, g:185, b:129 },
  { id:5, name:'キャラクター', sub:'Object · GLB / USDZ', emoji:'✨',
    orbA:'#f43f5e', orbB:'#fb7185', orbGlow:'rgba(244,63,94,.5)',
    orbR1:'rgba(244,63,94,.45)', orbR2:'rgba(251,113,133,.4)', orbR3:'rgba(168,85,247,.25)',
    orbBg:'rgba(244,63,94,.07)', r:244, g:63, b:94 },
];

/* ─────────── Build cards ─────────── */
const bento    = document.getElementById('bento');
const pageBase = location.href.replace(/\/[^/]*$/, '/');

MODELS.forEach((m, i) => {
  const glow    = `rgba(${m.r},${m.g},${m.b},.14)`;
  const num     = String(m.id).padStart(2,'0');
  const glbSrc  = `${pageBase}${m.id}.glb`;
  const usdzSrc = `${pageBase}${m.id}.usdz`;

  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.style.transitionDelay = `${i * 80}ms`;
  wrap.dataset.id = m.id;

  wrap.innerHTML = `
    <div class="card" style="--glow:${glow}; --card-orb-bg:${m.orbBg};">
      <div class="card-glow"></div>
      <div class="card-viewer" data-viewer="${m.id}">
        <model-viewer
          src="${glbSrc}"
          ios-src="${usdzSrc}"
          alt="${m.name}"
          auto-rotate
          auto-rotate-delay="300"
          rotation-per-second="18deg"
          interaction-prompt="none"
          loading="lazy"
          scale="0.01 0.01 0.01"
        ></model-viewer>
      </div>
      <div class="card-foot">
        <div class="foot-meta">
          <div class="foot-num">MODEL ${num}</div>
          <div class="foot-name">${m.name}</div>
          <div class="foot-sub">${m.sub}</div>
        </div>
        <div class="ar-chip">
          AR
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M7 17L17 7M7 7h10v10"/>
          </svg>
        </div>
      </div>
    </div>`;

  wrap.addEventListener('click', () => openModal(m));

  /* 3D tilt (desktop only) */
  const card = wrap.querySelector('.card');
  wrap.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width  - .5) * 2;
    const y = ((e.clientY - r.top)  / r.height - .5) * 2;
    card.style.setProperty('--ry', `${x * 5}deg`);
    card.style.setProperty('--rx', `${-y * 5}deg`);
  });
  wrap.addEventListener('mouseleave', () => {
    card.style.setProperty('--ry', '0deg');
    card.style.setProperty('--rx', '0deg');
  });

  bento.appendChild(wrap);
});

/* ─────────── GLB error → orb fallback ─────────── */
document.querySelectorAll('.card-viewer model-viewer').forEach(mv => {
  mv.addEventListener('error', () => {
    const viewer = mv.closest('.card-viewer');
    const id = parseInt(viewer.dataset.viewer);
    const m  = MODELS.find(x => x.id === id);
    if (!m) return;
    const num = String(id).padStart(2,'0');
    mv.remove();
    viewer.insertAdjacentHTML('beforeend', `
      <div class="orb-scene" style="
        --card-orb-a:${m.orbA}; --card-orb-b:${m.orbB};
        --card-orb-glow:${m.orbGlow};
        --card-orb-r1:${m.orbR1}; --card-orb-r2:${m.orbR2}; --card-orb-r3:${m.orbR3};
      ">
        <div class="orb-core"></div>
        <div class="orb-ring orb-ring-1"></div>
        <div class="orb-ring orb-ring-2"></div>
        <div class="orb-ring orb-ring-3"></div>
        <div class="orb-dots"></div>
      </div>
      <div class="orb-tag">MODEL ${num}</div>`);
  });
});

/* ─────────── Card reveal ─────────── */
const cardObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
}, { threshold: 0, rootMargin: '0px 0px 400px 0px' });
document.querySelectorAll('.card-wrap').forEach(w => cardObs.observe(w));
setTimeout(() => {
  if (!document.querySelector('.card-wrap.in-view'))
    document.querySelectorAll('.card-wrap').forEach((w,i) =>
      setTimeout(() => w.classList.add('in-view'), 100 + i*80));
}, 800);

/* ─────────── Hero entrance ─────────── */
document.querySelectorAll('[data-in]').forEach((el, i) => {
  el.style.transition = `opacity .72s ease ${i*120}ms, transform .72s ease ${i*120}ms`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }));
});

/* ─────────── Custom cursor ─────────── */
const dot  = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function animCursor() {
  dot.style.left  = mx+'px'; dot.style.top  = my+'px';
  rx += (mx-rx)*.11; ry += (my-ry)*.11;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(animCursor);
})();

/* ─────────── AR Modal ─────────── */
const modal       = document.getElementById('ar-modal');
const modalMv     = document.getElementById('modal-mv');
const btnArLaunch = document.getElementById('btn-ar-launch');
const btnCls      = document.getElementById('btn-close');
const scName      = document.getElementById('sc-name');
const shCard      = document.querySelector('.sheet-card');
let active = null;

function openModal(m, isRandom = false) {
  active = m;
  scName.textContent = m.name;

  const c = `rgba(${m.r},${m.g},${m.b}`;
  shCard.style.setProperty('--sc-color', `${c},.07)`);

  modalMv.setAttribute('src',     `${pageBase}${m.id}.glb`);
  modalMv.setAttribute('ios-src', `${pageBase}${m.id}.usdz`);

  /* ランダムモード: モデル名・プレビューを隠す */
  if (isRandom) {
    modal.classList.add('random-mode');
    modalMv.style.display = 'none';
  } else {
    modal.classList.remove('random-mode');
    modalMv.style.display = 'block';
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open', 'random-mode');
  modalMv.style.display = 'block';
  document.body.style.overflow = '';
  modalMv.removeAttribute('src');
  modalMv.removeAttribute('ios-src');
}

/* AR 起動 — model-viewer 公式 API */
btnArLaunch.addEventListener('click', () => {
  if (modalMv.canActivateAR) {
    modalMv.activateAR();
  } else {
    alert('このデバイスまたはブラウザはARに対応していません。\niOS Safari / Android Chrome でお試しください。');
  }
});

/* ─────────── ランダムAR ─────────── */
document.getElementById('btn-random').addEventListener('click', () => {
  const m = MODELS[Math.floor(Math.random() * MODELS.length)];
  openModal(m, true); /* true = random/mystery mode */
});

btnCls.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
